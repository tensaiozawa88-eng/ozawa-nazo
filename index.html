<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小澤なぞなぞ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FFF8EE;--card:#FFFFFF;--pop:#FF6B35;--pop-light:#FF8F61;
  --pop-pale:#FFF0E6;--mint:#2EC4B6;--yellow:#FFD166;
  --ink:#2D2A26;--ink-sub:#7A756D;--border:#F0E8DC;
  --correct:#2EC4B6;--wrong:#FF6B6B;
}
html{font-size:16px}
body{background:var(--bg);color:var(--ink);font-family:'Zen Maru Gothic',sans-serif;min-height:100vh;line-height:1.7}
.wrap{max-width:480px;margin:0 auto;padding:48px 20px 100px}
.header{text-align:center;margin-bottom:32px}
.header-emoji{font-size:2.4rem;margin-bottom:8px}
.header-title{font-size:1.6rem;font-weight:900;color:var(--ink);letter-spacing:.05em}
.header-date{display:inline-block;font-size:.72rem;font-weight:500;color:var(--pop);background:var(--pop-pale);padding:4px 14px;border-radius:20px;margin-top:10px;letter-spacing:.08em}
.timer-wrap{margin-bottom:28px;text-align:center}
.timer-bar-bg{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.timer-bar{height:100%;background:var(--mint);transition:width 1s linear;border-radius:3px}
.timer-bar.warn{background:var(--yellow)}.timer-bar.danger{background:var(--wrong);animation:pulse 1s infinite}
.timer-text{font-size:.75rem;color:var(--ink-sub);margin-top:6px;font-weight:500;font-variant-numeric:tabular-nums}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.card{background:var(--card);border-radius:20px;padding:36px 28px;margin-bottom:24px;box-shadow:0 2px 20px rgba(0,0,0,.04)}
.q-label{font-size:.68rem;font-weight:700;color:var(--pop);letter-spacing:.12em;margin-bottom:14px}
.q-text{font-size:1.2rem;font-weight:700;line-height:2;color:var(--ink)}
.input-area{margin-bottom:20px}
.text-input{width:100%;border:2px solid var(--border);border-radius:14px;padding:14px 18px;font-size:1rem;font-family:'Zen Maru Gothic',sans-serif;color:var(--ink);outline:none;transition:border-color .2s;font-weight:500;margin-bottom:10px}
.text-input:focus{border-color:var(--pop-light)}
.text-input::placeholder{color:#C4BDB2}
.submit-btn{width:100%;background:var(--pop);color:#fff;border:none;border-radius:14px;padding:16px 24px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;transition:background .2s}
.submit-btn:hover{background:var(--pop-light)}
.submit-btn:disabled{background:#D4CFC7;cursor:default}
.result{text-align:center;padding:24px 0}
.result-emoji{font-size:3rem;margin-bottom:8px}
.result-label{font-size:1.4rem;font-weight:900;margin-bottom:4px}
.result-label.ok{color:var(--correct)}.result-label.ng{color:var(--wrong)}
.result-answer{font-size:.88rem;color:var(--ink-sub);margin-top:10px;line-height:1.8}
.result-answer strong{color:var(--ink);font-weight:700}
.result-ozawa{font-size:.95rem;color:var(--yellow);background:rgba(45,42,38,.93);padding:12px 20px;border-radius:10px;margin-top:16px;font-weight:700}
.badge{display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.15em;padding:5px 18px;border-radius:20px;margin-top:14px}
.badge.genius{background:#E0FFF8;color:var(--mint);border:2px solid var(--mint)}
.badge.ordinary{background:#F5F0EA;color:var(--ink-sub);border:2px solid var(--border)}
.result-time{font-size:.72rem;color:var(--ink-sub);margin-top:8px;font-weight:500}
.ozawa-stack{position:fixed;top:0;left:0;right:0;z-index:100;pointer-events:none;display:flex;flex-direction:column;align-items:center}
.ozawa-msg{pointer-events:auto;background:rgba(45,42,38,.93);color:var(--yellow);font-family:'Zen Maru Gothic',sans-serif;font-size:.82rem;font-weight:700;line-height:1.5;padding:11px 20px;margin-bottom:2px;width:100%;text-align:center;animation:ozIn .4s cubic-bezier(.22,1,.36,1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
@keyframes ozIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.overlay{position:fixed;inset:0;background:rgba(255,248,238,.96);z-index:200;display:none;justify-content:center;align-items:center;padding:20px}
.overlay.show{display:flex}
.over-card{text-align:center;max-width:360px}
.over-emoji{font-size:3rem;margin-bottom:12px}
.over-title{font-size:1.1rem;color:var(--wrong);font-weight:900;letter-spacing:.1em;margin-bottom:20px}
.over-answer{font-size:1.3rem;font-weight:900;color:var(--ink);margin-bottom:16px;line-height:1.8}
.over-ex{font-size:.82rem;color:var(--ink-sub);margin-bottom:24px;line-height:1.8}
.retry-btn{background:var(--pop);color:#fff;border:none;border-radius:14px;padding:14px 36px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;transition:background .2s}
.retry-btn:hover{background:var(--pop-light)}
@media(max-width:480px){.wrap{padding:36px 16px 80px}.header-title{font-size:1.4rem}.q-text{font-size:1.1rem}.card{padding:28px 22px;border-radius:16px}}
</style>
</head>
<body>
<div class="ozawa-stack" id="ozawaStack"></div>
<div class="wrap">
  <div class="header">
    <div class="header-emoji">🤔</div>
    <div class="header-title">小澤なぞなぞ</div>
    <div class="header-date" id="dateLabel"></div>
  </div>
  <div class="timer-wrap">
    <div class="timer-bar-bg"><div class="timer-bar" id="timerBar"></div></div>
    <div class="timer-text" id="timerText">10:00</div>
  </div>
  <div class="card">
    <div class="q-label">TODAY'S RIDDLE</div>
    <div class="q-text" id="qText"></div>
  </div>
  <div id="answerArea"></div>
  <div id="resultArea"></div>
</div>
<div class="overlay" id="overOverlay">
  <div class="over-card">
    <div class="over-emoji">⏰</div>
    <div class="over-title">TIME OVER</div>
    <div class="over-answer" id="overAnswer"></div>
    <div class="over-ex" id="overEx"></div>
    <button class="retry-btn" onclick="init()">もう一度</button>
  </div>
</div>
<script>

let riddle=null,tmr=600,ti=null,qi=0,oi=null,lo=-1,ans=false;
function init(){
document.getElementById('ozawaStack').innerHTML='';
document.getElementById('overOverlay').classList.remove('show');
const n=new Date();
document.getElementById('dateLabel').textContent=`${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日のなぞなぞ`;
const s=new Date(n.getFullYear(),0,0),d=Math.floor((n-s)/864e5);
riddle=R[d%R.length];
tmr=600;ans=false;
if(ti)clearInterval(ti);if(oi)clearInterval(oi);
upTm();ti=setInterval(tk,1000);oi=setInterval(ozw,20000);
document.getElementById('qText').textContent=riddle.q;
document.getElementById('resultArea').innerHTML='';
qi=Date.now();
document.getElementById('answerArea').innerHTML=`<div class="input-area"><input class="text-input" id="inp" placeholder="答えを入力…" onkeydown="if(event.key==='Enter')sub()"><button class="submit-btn" onclick="sub()">回答する</button></div>`;
document.getElementById('inp').focus();
}
function tk(){tmr--;upTm();if(tmr<=0){clearInterval(ti);clearInterval(oi);showTO();}}
function upTm(){
const m=Math.floor(tmr/60),s=tmr%60;
document.getElementById('timerText').textContent=`残り ${m}:${s.toString().padStart(2,'0')}`;
const p=(tmr/600)*100,b=document.getElementById('timerBar');
b.style.width=p+'%';b.className='timer-bar';
if(tmr<=60)b.classList.add('danger');else if(tmr<=180)b.classList.add('warn');
}
function nm(s){return s.replace(/[\s　・、。，．!！?？「」『』（）\(\)\/\-ー～~]/g,'').toLowerCase();}
function toHira(s){return s.replace(/[\u30A1-\u30F6]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));}
function chk(input,answers){
const ni=toHira(nm(input));
if(!ni)return false;
for(const a of answers){
  const na=toHira(nm(a));
  if(ni===na)return true;
  if(ni.length>=2&&na.startsWith(ni))return true;
  if(na.length>=2&&ni.startsWith(na))return true;
}
return false;
}
function sub(){
if(ans)return;const inp=document.getElementById('inp'),v=inp.value.trim();
if(!v)return;ans=true;inp.disabled=true;document.querySelector('.submit-btn').disabled=true;
clearInterval(ti);clearInterval(oi);
const el=(Date.now()-qi)/1000,ok=chk(v,riddle.a);
const g=ok&&el<=20,rs=document.getElementById('resultArea');
let h='<div class="result">';
if(ok){
  h+=`<div class="result-emoji">${g?'🎉':'😊'}</div>`;
  h+=`<div class="result-label ok">${g?'天才！！':'正解！'}</div>`;
  h+=`<span class="badge ${g?'genius':'ordinary'}">${g?'天才':'凡人'}</span>`;
  h+=`<div class="result-time">${el.toFixed(1)}秒で回答</div>`;
  if(riddle.ex){h+=`<div class="result-answer" style="margin-top:10px;font-size:.78rem">💡 ${riddle.ex}</div>`;}
}else{
  h+=`<div class="result-emoji">😭</div>`;
  h+=`<div class="result-label ng">不正解…</div>`;
  h+=`<span class="badge ordinary">凡人</span>`;
  h+=`<div class="result-ozawa">小澤さん「答え教えるわけないよね」</div>`;
}
h+='</div>';rs.innerHTML=h;
}
function ozw(){
let i;do{i=Math.floor(Math.random()*O.length);}while(i===lo);lo=i;
const s=document.getElementById('ozawaStack'),m=document.createElement('div');
m.className='ozawa-msg';m.textContent=O[i];s.appendChild(m);
}
function showTO(){
document.getElementById('overAnswer').innerHTML=`正解は<br><strong>${riddle.a[0]}</strong>`;
document.getElementById('overEx').innerHTML=riddle.ex?`💡 ${riddle.ex}`:'';
document.getElementById('overOverlay').classList.add('show');
}
init();
